databases:
  - name: stalk-db
    plan: free

services:
  - type: web
    name: stalk
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: STALK_HOSTED
        value: "true"
      - key: STALK_PROVIDER
        value: free
      - key: STALK_MODEL
        value: openai-fast
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stalk-db
          property: connectionString
