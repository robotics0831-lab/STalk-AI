databases:
  - name: stalk-db
    plan: free

services:
  - type: web
    name: stalk
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: STALK_HOSTED
        value: "true"
      - key: STALK_PROVIDER
        value: groq
      - key: STALK_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
      - key: POLLINATIONS_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stalk-db
          property: connectionString
